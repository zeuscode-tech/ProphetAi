services:
  db:
    image: postgres:15-alpine
    container_name: prophetai_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-prophetai}
      POSTGRES_USER: ${POSTGRES_USER:-prophetai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-prophetai_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-prophetai}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: prophetai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prophetai_backend
    restart: unless-stopped
    command: gunicorn prophetai.wsgi:application --bind 0.0.0.0:8000 --workers 2
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-prophetai}:${POSTGRES_PASSWORD:-prophetai_secret}@db:5432/${POSTGRES_DB:-prophetai}
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      ALLOWED_HOSTS: "localhost,127.0.0.1,backend"
    volumes:
      - ./backend:/app
      - static_files:/app/staticfiles
      - media_files:/app/media
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: prophetai_celery
    restart: unless-stopped
    command: celery -A prophetai worker --loglevel=info
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-prophetai}:${POSTGRES_PASSWORD:-prophetai_secret}@db:5432/${POSTGRES_DB:-prophetai}
      REDIS_URL: redis://redis:6379/0
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
    volumes:
      - ./backend:/app
    depends_on:
      - backend
      - redis

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: prophetai_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  static_files:
  media_files:
